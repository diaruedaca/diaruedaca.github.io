{% include base_path %}

<!-- start custom head snippets -->

<!-- Support for Academicons -->
<link rel="stylesheet" href="{{ base_path }}/assets/css/academicons.css"/>

<!-- favicon from https://commons.wikimedia.org/wiki/File:OOjs_UI_icon_academic-progressive.svg -->
<link rel="apple-touch-icon" sizes="180x180" href="{{ base_path }}/images/apple-touch-icon-180x180.png"/>
<link rel="icon" type="image/svg+xml" href="{{ base_path }}/images/favicon.svg"/>
<link rel="icon" type="image/png" href="{{ base_path }}/images/favicon-32x32.png" sizes="32x32"/>
<link rel="icon" type="image/png" href="{{ base_path }}/images/favicon-192x192.png" sizes="192x192"/>
<link rel="manifest" href="{{ base_path }}/images/manifest.json"/>
<link rel="icon" href="/images/favicon.ico"/>
<meta name="theme-color" content="#ffffff"/>

<!-- Tinos: metric-compatible with Times New Roman, for consistent rendering everywhere -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Tinos:ital,wght@0,400;0,700;1,400;1,700&display=swap">

<style>
  /* Times New Roman across the site (icons keep their own font because the
     Font Awesome / Academicons rules target .fa/.ai elements directly). */
  body,
  h1, h2, h3, h4, h5, h6,
  p, ul, ol, li, dt, dd, blockquote, figcaption, label, table,
  a, .btn, button, input, textarea, select,
  .author__name, .author__pronouns, .author__bio, .author__urls,
  .masthead, .greedy-nav, .site-title, .site-subtitle,
  .page__title, .page__content, .page__meta,
  .archive__item-title, .archive__item-excerpt, .page__footer {
    font-family: "Times New Roman", Tinos, Times, Georgia, serif;
  }

  /* Comfortable reading size for the main column only (keeps the grid intact,
     so the sidebar no longer overlaps the content). */
  .page__content { font-size: 1.08rem; line-height: 1.7; }
  .archive .archive__item-excerpt { font-size: 1rem; line-height: 1.6; }

  /* Justify the body copy for an even, polished text block. */
  .page__content p,
  .page__content li,
  .page__content blockquote,
  .archive__item-excerpt {
    text-align: justify;
    text-justify: inter-word;
    -webkit-hyphens: auto;
    hyphens: auto;
  }

  /* Keep navigation, titles and meta left-aligned. */
  .masthead, .greedy-nav, .page__title,
  .archive__item-title, .page__meta, .author__urls li {
    text-align: left;
  }

  /* Fix sidebar/content overlap on wide screens: the fixed sidebar's width is a
     % of the viewport, but the content only reserves ~2/12 of the 1280px grid
     (~213px). The theme's 250px max-width is too wide, so cap it to clear. */
  @media screen and (min-width: 1024px) {
    .sidebar { max-width: 200px; }
  }
</style>

<!-- end custom head snippets -->
